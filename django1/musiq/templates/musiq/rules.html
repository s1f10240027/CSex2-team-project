<!-- 遊び方 -->
{% load static %}
<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MusiQ</title>
        <link rel="icon" href="{% static 'media/favicon.ico' %}" type="image/x-icon">
        <link rel="stylesheet" href="{% static 'css/curtain.css' %}">
        <link rel="stylesheet" href="./../../../static/css/rules.css">
    </head>
    <body>
        <div class="side-curtain left-curtain"></div>
        <div class="side-curtain right-curtain"></div>
        <div class="topButton_container">
            <a href="{% url 'index' %}" class="topButton">
                <img src="{% static 'media/home.png' %}" alt="Home Icon">TOPへ
            </a>
        </div>
        <div class="container">
            <div class="box">
                <h1>あそびかた</h1>
                <p>1.<img src="{% static 'media/play-icon' %}" class="play-icon">を押して<span class="span">ゲームスタート</span></p>
                <p>2.ジャンルを選択してね</p>
                <p>3.クリアした時間、間違えた数などでスコアが出るよ。<br>&nbsp;&nbsp;&nbsp;高いスコアを出して、ランキングに載ろう！</p>
                <p>4.君の<span class="wa">歌力</span>を試してみよう！</p>
            </div>
        </div>
    </body>
</html>
