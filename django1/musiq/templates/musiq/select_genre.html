<!-- ジャンル選択画面 -->
{% load static %}
<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <p>曲のジャンル選択画面だよ</p>
        {% for index, value in genre.items %}
            <button>
                <a href="{% url 'game' value %}">{{ value }}</a>
            </button>
            <br>
        {% endfor %}
    </body>
</html>
